<div class="video-container">
  <video
    #videoPlayer
    (timeupdate)="onTimeUpdate()"
    src="https://test-videos.co.uk/vids/bigbuckbunny/mp4/av1/360/Big_Buck_Bunny_360_10s_1MB.mp4"
    controls
  ></video>
  <canvas #annotationCanvas [class.drawing-active]="isDrawingMode" (mousedown)="handleCanvasClick($event)"></canvas>
</div>

<button (click)="toggleDrawingMode()">Toggle Drawing Mode</button>
